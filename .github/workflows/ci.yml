name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify ESM import
        run: node --input-type=module -e "await import('./dist/index.mjs')"

      - name: Verify CJS require
        run: node -e "require('./dist/index.cjs')"

      - name: Verify no node imports in dist
        run: |
          if grep -r "node:" dist/ 2>/dev/null; then
            echo "ERROR: found node: imports in dist/"
            exit 1
          fi

      - name: Check bundle size
        run: |
          SIZE=$(tar cf - dist/ | gzip -c | wc -c | tr -d ' ')
          KB=$((SIZE / 1024))
          echo "Compressed dist size: ${KB}KB"
          if [ "$KB" -gt 500 ]; then
            echo "WARNING: Bundle size exceeds 500KB target (${KB}KB)"
          fi

  comparison:
    name: Comparison Tests
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run comparison tests
        uses: peteretelej/smokepod@v1
        with:
          mode: verify
          target: node
          target-args: scripts/smokepod-adapter.mjs
          target-mode: process
          tests: tests/comparison/
          fixtures: tests/fixtures/
