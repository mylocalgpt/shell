name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify ESM import
        run: node --input-type=module -e "await import('./dist/index.mjs')"

      - name: Verify CJS require
        run: node -e "require('./dist/index.cjs')"

      - name: Verify no node: imports in dist
        run: |
          if grep -r "node:" dist/ 2>/dev/null; then
            echo "ERROR: found node: imports in dist/"
            exit 1
          fi

      - name: Publish
        run: npm publish --provenance --access public
